spring.application.name=ecommerce

# Configuración MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/ecommerce_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true 
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# JWT Configuration
# 1. Clave Secreta JWT (Secret Key)
# Esta clave se usa para firmar y validar el token. 
# Idealmente, use una variable de entorno en producción.
jwt.secret=miClaveSecretaDe32CaracteresParaJWT2025

# 2. Tiempo de Expiración del Token (Expiration Time)
# Define por cuánto tiempo será válido el token, en milisegundos (ms).
# Ejemplo: 24 horas = 86400000 ms
jwt.expiration=86400000